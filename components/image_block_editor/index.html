<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Image Block Editor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      font-family: sans-serif;
    }

    .wrapper {
      width: 100%;
    }

    .stage {
      position: relative;
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 10px;
      overflow: hidden;
      background: white;
    }

    .stage img {
      display: block;
      width: 100%;
      height: auto;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }

    .overlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      cursor: crosshair;
    }

    .hint {
      font-size: 13px;
      color: #666;
      margin: 8px 4px 0 4px;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="stage" id="stage">
      <img id="mainImage" alt="page image" />
      <svg class="overlay" id="overlay" preserveAspectRatio="none"></svg>
    </div>
    <div class="hint" id="hint"></div>
  </div>

  <script src="https://unpkg.com/streamlit-component-lib@1.5.0/dist/index.js"></script>
  <script src="./script.js"></script>
</body>
</html>
